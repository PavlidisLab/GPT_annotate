<text x='51.78' y='43.66' style='font-size: 10.00px;fill: #64748B; font-family: "Arial";' textLength='316.49px' lengthAdjust='spacingAndGlyphs'>diagonal (precision = recall = accuracy). text2term abstains ~25 % at its</text>
<text x='51.78' y='54.46' style='font-size: 10.00px;fill: #64748B; font-family: "Arial";' textLength='271.22px' lengthAdjust='spacingAndGlyphs'>threshold, lifting its precision above the diagonal at low recall.</text>
